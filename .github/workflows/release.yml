name: Build & Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use: cargo
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use: zigbuild
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            use: zigbuild
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            use: zigbuild
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-22.04
            use: zigbuild
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-22.04
            use: zigbuild
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-22.04
            use: zigbuild
          - target: x86_64-unknown-freebsd
            os: ubuntu-22.04
            use: zigbuild
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            use: cargo
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            use: cargo
          - target: i686-pc-windows-msvc
            os: windows-2022
            use: cargo
          - target: x86_64-apple-darwin
            os: macos-latest
            use: cargo
          - target: aarch64-apple-darwin
            os: macos-latest
            use: cargo
          - target: universal-apple-darwin
            os: macos-latest
            use: universal

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        if: ${{ matrix.use != 'universal' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install zig
        if: ${{ matrix.use == 'zigbuild' }}
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: ${{ matrix.use == 'zigbuild' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build with cargo-zigbuild
        if: ${{ matrix.use == 'zigbuild' }}
        run: cargo zigbuild --release --target ${{ matrix.target }} --package jinja-lsp

      - name: Build with cargo
        if: ${{ matrix.use == 'cargo' }}
        run: cargo build --release --target ${{ matrix.target }} --package jinja-lsp

      - name: Build universal macOS binary
        if: ${{ matrix.use == 'universal' }}
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p "target/${{ matrix.target }}/release"
          lipo -create -output "target/${{ matrix.target }}/release/jinja-lsp" \
            target/x86_64-apple-darwin/release/jinja-lsp \
            target/aarch64-apple-darwin/release/jinja-lsp

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p staged
          binary_name="jinja-lsp-${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "target/${{ matrix.target }}/release/jinja-lsp.exe" "staged/${binary_name}.exe"
            if [[ -f "target/${{ matrix.target }}/release/jinja-lsp.pdb" ]]; then
              cp "target/${{ matrix.target }}/release/jinja-lsp.pdb" "staged/${binary_name}.pdb"
            fi
          else
            cp "target/${{ matrix.target }}/release/jinja-lsp" "staged/${binary_name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: staged/*

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v7
        with:
          path: binaries

      - name: Upload artifacts to release
        uses: ncipollo/release-action@v1
        with:
          artifacts: binaries/*/*
          tag: ${{ github.ref_name }}
          allowUpdates: true
          prerelease: false
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
